sonar.projectKey=Pableitez_CargoLens
sonar.organization=pableitez

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=CargoLens
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Monorepo JS: rutas explícitas (si usas solo ".", descomenta sonar.sources arriba y ajusta exclusions)
sonar.sources=frontend/src,backend/src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js
