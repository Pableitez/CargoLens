sonar.host.url=https://sonarcloud.io

sonar.projectKey=Pableitez_CargoLens
sonar.organization=pableitez

# This is the name and version displayed in the SonarCloud UI.
#sonar.projectName=CargoLens
#sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
#sonar.sources=.

# Monorepo JS: rutas explícitas (si usas solo ".", descomenta sonar.sources arriba y ajusta exclusions)
sonar.sources=frontend/src,backend/src

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

sonar.exclusions=**/node_modules/**,**/dist/**,**/build/**,**/coverage/**,**/*.min.js

# LCOV generado en CI por Jest (backend) y Vitest (frontend)
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info

# Duplicación estructural EN/ES en i18n no es “copia” de lógica; excluir del CPD
sonar.cpd.exclusions=**/i18n/locales/**/*.js

# i18n: S2068 confunde etiquetas ("Contraseña", "Password") con credenciales reales
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=javascript:S2068
sonar.issue.ignore.multicriteria.e1.resourceKey=**/i18n/locales/**/*.js
 
